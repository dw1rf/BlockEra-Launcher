<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Sign In — BlockEra Launcher</title>
		<style>
			:root { color-scheme: dark; font-family: Inter, "Segoe UI", sans-serif; background: #070a11; color: #f8fafc; }
			body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 0, #37145f 0, #0b0f19 42%, #05070c 100%); }
			main { width: min(28rem, calc(100vw - 3rem)); padding: 2rem; border: 1px solid #a855f755; border-radius: 1.25rem; background: #0d121ddd; box-shadow: 0 2rem 6rem #0009; }
			.brand { margin: 0 0 1.5rem; color: #c084fc; font-size: .72rem; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; }
			h1 { margin: 0; font-size: 1.5rem; }
			.message { margin-top: .75rem; color: #cbd5e1; line-height: 1.55; }
		</style>
	</head>
	<body>
		<main>
			<p class="brand">BlockEra Launcher</p>
			<h1>{{title}}</h1>
			<div class="message">{{message}}</div>
		</main>
		<script>window.close()</script>
	</body>
</html>
