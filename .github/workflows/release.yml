name: Release BlockEra Launcher

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 9.15.0

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Prepare environment
        shell: pwsh
        run: Copy-Item packages/app-lib/.env.prod packages/app-lib/.env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish signed installer
        uses: tauri-apps/tauri-action@v0.5.24
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: apps/app
          tagName: v__VERSION__
          releaseName: BlockEra Launcher v__VERSION__
          releaseBody: |
            Новая версия BlockEra Launcher.

            Скачайте NSIS setup.exe из списка файлов ниже. Лаунчер проверяет подпись обновления перед установкой.
          releaseDraft: false
          prerelease: false
          retryAttempts: 5
          args: --bundles nsis --features updater
